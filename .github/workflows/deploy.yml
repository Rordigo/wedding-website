name: Deploy to GitHub Pages

# Builds the Angular app and publishes it to GitHub Pages on every push to main.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required by the GitHub Pages deploy actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Served at the root of the custom domain (www.arianeerodrigo.site),
      # so base-href is "/". The public/CNAME file sets the custom domain.
      # (If you ever drop the custom domain, change this back to
      #  --base-href "/${{ github.event.repository.name }}/".)
      - name: Build
        run: npm run build -- --base-href "/"

      # GitHub Pages has no server-side routing; serve the SPA for any path.
      - name: Add SPA 404 fallback
        run: cp dist/wedding-website/browser/index.html dist/wedding-website/browser/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable GitHub Pages (Actions source) on first run so no manual
          # Settings → Pages click is needed.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/wedding-website/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
